spring:
  application:
    name: SmartHospital
  server:
    port: ${SERVER_PORT:8080}
  cors:
    allowed-origins:
      - ${FRONTEND_URL}
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
      - Content-Type
    allow-credentials: true
    max-age: 3600

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 60000
      lettuce:
        shutdown-timeout: 100
        
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com 
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    defer-datasource-initialization: true #Ensures DB is ready before JPA runs
    hibernate:
      ddl-auto: update #auto create and update table
    show-sql: true #Logs SQL queries to console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

minio:
  url: ${MINIO_URL}
  accessKey: ${MINIO_USER}
  secretKey: ${MINIO_PASSWORD}
  bucket: avatars
  presigned-expiry-seconds: ${MINIO_PRESIGNED_EXPIRY_SECONDS:3600}

gemini:
  # Loaded from .env → System properties (see SmartHospitalApplication) or OS env
  api-key: ${GEMINI_API_KEY:}

jwt:
  secret: ${JWT_SECRET}
  access:
    expiration: 86400000 # 1 day
  refresh:
    expiration: 604800000 # 1 week
  otp:
    expiration: 300000 # 5 minutes

app:
  notifications:
    rabbit:
      # Keep enabled in production to avoid dropping events during websocket disconnects/restarts.
      # We still send websocket notifications first, RabbitMQ acts as durable secondary delivery.
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  show-actuator: false
